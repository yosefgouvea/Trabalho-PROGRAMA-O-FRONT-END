<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogador da Copa do Mundo</title>
    <!-- Bootstrap via CDN (funciona sem precisar dos arquivos locais).
         Se quiser usar local, troque por: <link href="css/bootstrap.css" rel="stylesheet"> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html {
            height: 100%;
            margin: 0;
        }
        .bg-copa {
            background-image: url('FIFA-World-Cup-26.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }
        .card {
            backdrop-filter: blur(5px);
            background-color: rgba(226, 226, 226, 0.9);
            border: none;
            box-shadow: 0 10px 30px rgba(3, 3, 3, 0.5);
        }
    </style>
</head>
<body>
    <div class="bg-copa">
        <div class="d-flex flex-column align-items-center">
            <div class="card" style="width: 22rem;">
                <img id="imgJogador" src="img/img_.svg" class="card-img-top" alt="Placeholder Copa">

                <div class="card-body">
                    <h5 class="card-title placeholder-glow">
                        <span id="Nome" class="placeholder col-6"></span>
                        <span id="Rank" class="badge text-bg-secondary">-</span>
                    </h5>
                    <p class="placeholder-glow">
                        <span id="Data_Nas" class="placeholder col-4"></span><br>
                        <span id="Altura" class="placeholder col-4"></span><br>
                        <span id="Posicao" class="placeholder col-6"></span><br>
                    </p>
                </div>
            </div>

            <a href="#" onclick="revelar()" class="btn btn-primary" style="margin: 10px; padding: 10px;">
                Revelar
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
